name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: 🔍 Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: 🏗️ Build packages
        run: vp run tvs#build

      - name: 🧹 Lint & format
        run: vp check

      - name: 🧪 Test
        run: vp test

  build:
    name: 📦 Build
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: 🏗️ Build all packages
        run: vp run -r build

  bundle:
    name: 📏 Bundle (size + tree-shaking)
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: 🏗️ Build tvs
        run: vp run tvs#build

      - name: 📐 Check bundle size (+ tree-shaking)
        working-directory: packages/tvs
        run: vp exec size-limit --json

      - name: 🗂️ Check types size
        working-directory: packages/tvs
        run: |
          limit=10240
          size=$(wc -c < dist/index.d.mts)
          echo "Types size: ${size} B (limit: ${limit} B)"
          if [ "$size" -gt "$limit" ]; then
            echo "❌ Types exceeded limit: ${size} B > ${limit} B"
            exit 1
          fi
          echo "✅ Types within limit"
