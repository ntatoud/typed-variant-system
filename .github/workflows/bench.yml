name: Benchmark

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/typed-variant-system/src/**"
      - "packages/bench/src/**"

permissions:
  pull-requests: write

jobs:
  bench:
    name: ⚡ Benchmark
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: voidzero-dev/setup-vp@v1
        with:
          cache: true

      - name: 🏗️ Build typed-variant-system
        run: vp run typed-variant-system#build

      - name: 🏎️ Run benchmarks
        run: vp run bench#bench | tee bench-output.txt

      - name: 💬 Post results as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('bench-output.txt', 'utf8');

            // Parse output into categories > sections > rows.
            // Categories are delimited by ━━━ lines, sections by ── lines.
            const categories = [];
            let currentCategory = null;
            let currentSection = null;

            for (const raw of output.split('\n')) {
              const line = raw.trim();

              const categoryMatch = line.match(/^━━━ (.+?) ━+$/);
              if (categoryMatch) {
                currentSection = null;
                currentCategory = { title: categoryMatch[1], note: '', sections: [] };
                categories.push(currentCategory);
                continue;
              }

              // Parenthesised note line just below a category header
              if (currentCategory && !currentSection && line.startsWith('(')) {
                currentCategory.note = line.replace(/^\(|\)$/g, '');
                continue;
              }

              const sectionMatch = line.match(/^── (.+?) ──$/);
              if (sectionMatch && currentCategory) {
                currentSection = { title: sectionMatch[1], rows: [], verdict: '' };
                currentCategory.sections.push(currentSection);
                continue;
              }

              const rowMatch = line.match(/^(\S+)\s+avg=\s*([\d.]+)ns\s+p50=\s*([\d.]+)ns\s+p99=\s*([\d.]+)ns\s+([\d.]+)\s+M ops\/s/);
              if (rowMatch && currentSection) {
                currentSection.rows.push({ tool: rowMatch[1], avg: rowMatch[2], p50: rowMatch[3], p99: rowMatch[4], mops: rowMatch[5] });
                continue;
              }

              const verdictMatch = line.match(/^→ (.+)/);
              if (verdictMatch && currentSection) {
                currentSection.verdict = verdictMatch[1];
              }
            }

            function renderSection({ title, rows, verdict }) {
              let s = `#### ${title}\n\n`;
              s += '| Tool | avg | p50 | p99 | M ops/s |\n';
              s += '|---|---:|---:|---:|---:|\n';
              for (const { tool, avg, p50, p99, mops } of rows) {
                s += `| \`${tool}\` | ${avg} ns | ${p50} ns | ${p99} ns | ${mops} |\n`;
              }
              if (verdict) {
                const isFaster = !verdict.includes('slower');
                const icon = isFaster ? '✅' : '⚠️';
                const emphasized = verdict.replace(/([\d.]+x (?:faster|slower))/, '**$1**');
                s += `\n${icon} ${emphasized}\n`;
              }
              return s;
            }

            const CATEGORY_ICONS = {
              'tvs vs cva': '⚡',
              'cn parity': '🔁',
              'internal overhead': '🔬',
            };

            let md = '<!-- bench-results -->\n## ⚡ Benchmark Results\n\n';

            for (const category of categories) {
              const icon = Object.entries(CATEGORY_ICONS).find(([k]) => category.title.toLowerCase().includes(k.toLowerCase()))?.[1] ?? '📊';
              const sectionsWithVerdict = category.sections.filter(s => s.rows.length > 0);
              md += `<details>\n<summary>${icon} <strong>${category.title}</strong></summary>\n\n`;
              if (category.note) md += `> ${category.note}\n\n`;
              for (const section of sectionsWithVerdict) md += renderSection(section) + '\n';
              md += '</details>\n\n';
            }

            md += '> Benchmarks run on GitHub Actions — relative comparisons are meaningful, absolute values vary by runner.';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('<!-- bench-results -->'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: md,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: md,
              });
            }
